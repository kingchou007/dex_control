syntax = "proto3";

package franka;

// Generic RPC service for Franka robot control.
// Uses repeated doubles for flexible vector arguments (joints, poses, etc.).

service FrankaRobot {
  // State queries
  rpc GetJointPositions (Empty) returns (JointValues);
  rpc GetEePose (Empty) returns (EePose);
  rpc GetExternalTorques (Empty) returns (JointValues);
  rpc GetState (Empty) returns (RobotState);

  // Motion commands
  rpc MoveEePose (MoveEePoseRequest) returns (BoolResponse);
  rpc MoveEeWaypoints (WaypointsRequest) returns (BoolResponse);
  rpc MoveJoints (MoveJointsRequest) returns (BoolResponse);
  rpc MoveJointWaypoints (WaypointsRequest) returns (BoolResponse);

  // Gripper state
  rpc GetGripperWidth (Empty) returns (FloatResponse);
  rpc GetGripperMaxWidth (Empty) returns (FloatResponse);
  rpc IsGripperGrasped (Empty) returns (BoolResponse);

  // Gripper control
  rpc MoveGripper (MoveGripperRequest) returns (BoolResponse);
  rpc OpenGripper (GripperActionRequest) returns (BoolResponse);
  rpc GraspObject (GraspRequest) returns (BoolResponse);
  rpc StopGripper (GripperActionRequest) returns (BoolResponse);
  rpc HomingGripper (GripperActionRequest) returns (BoolResponse);

  // Impedance / kinesthetic teaching
  rpc SetJointImpedance (JointValues) returns (BoolResponse);
  rpc StartGravityCompensation (DurationRequest) returns (BoolResponse);
  rpc StopMotion (Empty) returns (BoolResponse);
}

// ---- Messages ----

message Empty {}

message BoolResponse {
  bool success = 1;
}

message FloatResponse {
  double value = 1;
}

message JointValues {
  repeated double values = 1;
}

message EePose {
  repeated double translation = 1;  // [x, y, z]
  repeated double quaternion = 2;   // [qx, qy, qz, qw]
}

message RobotState {
  map<string, DoubleList> data = 1;
}

message DoubleList {
  repeated double values = 1;
}

message MoveEePoseRequest {
  repeated double target_pose = 1;
  bool asynchronous = 2;
  bool delta = 3;
}

message MoveJointsRequest {
  repeated double target_positions = 1;
  bool asynchronous = 2;
}

message WaypointsRequest {
  repeated DoubleList waypoints = 1;
  bool delta = 2;
}

message MoveGripperRequest {
  double target_width = 1;
  double speed = 2;
  bool asynchronous = 3;
}

message GripperActionRequest {
  double speed = 1;
  bool asynchronous = 2;
}

message GraspRequest {
  double width = 1;
  double speed = 2;
  double force = 3;
  double epsilon_inner = 4;
  double epsilon_outer = 5;
  bool asynchronous = 6;
}

message DurationRequest {
  double duration = 1;
}
